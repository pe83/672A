<html manifest="offline.cache">
<head>
<script>
function DLProgress(e){
	parent.ScrOverlay.style.display="block";
	Percent=(Math.round(e.loaded / e.total * 100));
	parent.cacheUPDtxt.innerHTML="Installing Offline Cache: " + Percent + "%";
	parent.CacheBar.style.width=Percent + '%';
}
function DisplayCacheProgress(){
	setTimeout(function(){parent.cacheUPDtxt.innerHTML="Cache Installed Successfully";},1000);
	setTimeout(function(){parent.CacheProgress.style.display="none";parent.cacheUPDtxt.innerHTML="<hr>Press PS To Close The Browser<br>Disable internet connection<br>Restart PS4 device<hr>للخروج من المتصفح PS اضغط<br>الغاء الاتصال بالانترنت <br>اعد تشغيل الجهاز<hr>";},2500);
	//if (localStorage.AutoJB=="ON"){setTimeout(function(){parent.runJB();},2500);}//Auto JB
	//else {
	//setTimeout(function(){parent.ScrOverlay.style.opacity="0";},2500);
	//setTimeout(function(){parent.ScrOverlay.style.display="none";},3500);
	//}
	}
	window.applicationCache.addEventListener("progress",DLProgress,false);
	window.applicationCache.oncached=function(e){DisplayCacheProgress();};
	window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
	window.applicationCache.onerror=function(e){parent.cacheUPDtxt.innerHTML="Error Installing Cache";
};
</script>
</head>
<body>
</body>
</html>
